<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="日報アプリ">
  <title>日報アプリ</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom);
    }
    header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 16px 16px;
      padding-top: calc(20px + env(safe-area-inset-top));
      text-align: center;
    }
    header h1 { font-size: 22px; font-weight: 700; }
    header p { font-size: 13px; opacity: 0.85; margin-top: 4px; }
    .container { max-width: 600px; margin: 0 auto; padding: 16px; }
    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .card h2 { font-size: 16px; color: #667eea; margin-bottom: 12px; font-weight: 600; }
    textarea {
      width: 100%;
      border: 2px solid #e8ecf0;
      border-radius: 12px;
      padding: 12px;
      font-size: 15px;
      font-family: inherit;
      resize: vertical;
      min-height: 120px;
      transition: border-color 0.2s;
      line-height: 1.6;
    }
    textarea:focus { outline: none; border-color: #667eea; }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 10px;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
    .btn-voice { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }
    .btn-voice.recording { background: linear-gradient(135deg, #f5576c, #c0392b); animation: pulse 1s infinite; }
    .btn-success { background: linear-gradient(135deg, #4facfe, #00f2fe); color: white; }
    .btn-secondary { background: #f0f2f5; color: #555; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.7; } }
    .status {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      margin-top: 10px;
      display: none;
    }
    .status.show { display: block; }
    .status.info { background: #e8f4fd; color: #2980b9; }
    .status.success { background: #e8f8f0; color: #27ae60; }
    .status.error { background: #fde8e8; color: #e74c3c; }
    .date-display {
      font-size: 13px;
      color: #888;
      text-align: center;
      margin-bottom: 16px;
    }
    .auth-section { text-align: center; }
    .auth-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: white;
      border: 2px solid #e8ecf0;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      color: #333;
    }
    .auth-btn:hover { border-color: #667eea; }
    .auth-status { font-size: 13px; color: #888; margin-top: 8px; }
    .summary-box {
      background: #f8f9ff;
      border: 1px solid #e0e4ff;
      border-radius: 10px;
      padding: 12px;
      font-size: 14px;
      line-height: 1.7;
      color: #444;
      margin-top: 10px;
      white-space: pre-wrap;
    }
    .api-key-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .api-key-row input {
      flex: 1;
      border: 2px solid #e8ecf0;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
    }
    .api-key-row input:focus { outline: none; border-color: #667eea; }
    .api-key-row button {
      padding: 10px 16px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
    }
    .history-item {
      border-bottom: 1px solid #f0f2f5;
      padding: 10px 0;
      font-size: 13px;
    }
    .history-item:last-child { border-bottom: none; }
    .history-date { color: #667eea; font-weight: 600; }
    .history-text { color: #555; margin-top: 3px; }
  </style>
</head>
<body>

<header>
  <h1>📋 日報アプリ</h1>
  <p>音声入力 → 自動要約 → Google Sheets保存</p>
</header>

<div class="container">

  <!-- 日付 -->
  <div class="date-display" id="dateDisplay"></div>

  <!-- Google認証 -->
  <div class="card">
    <h2>🔐 Google アカウント連携</h2>
    <div class="auth-section">
      <button class="auth-btn" id="authBtn" onclick="handleAuth()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Google でログイン
      </button>
      <div class="auth-status" id="authStatus">未ログイン</div>
    </div>
  </div>

  <!-- Claude APIキー設定 -->
  <div class="card">
    <h2>🤖 Claude API 設定（要約機能）</h2>
    <p style="font-size:13px;color:#888;margin-bottom:8px;">Anthropic Console でAPIキーを取得して入力すると自動要約が使えます</p>
    <div class="api-key-row">
      <input type="password" id="claudeApiKey" placeholder="sk-ant-..." value="">
      <button onclick="saveApiKey()">保存</button>
    </div>
    <div id="apiKeyStatus" class="status"></div>
  </div>

  <!-- 音声入力・日報作成 -->
  <div class="card">
    <h2>🎙️ 日報入力</h2>
    <button class="btn btn-voice" id="voiceBtn" onclick="toggleVoice()">
      🎤 音声入力開始
    </button>
    <div id="voiceStatus" class="status"></div>
    <textarea id="reportText" placeholder="ここに日報を入力（音声または手入力）&#10;&#10;例：今日は〇〇の作業を完了しました。課題として△△があります。" style="margin-top:12px;"></textarea>
    <button class="btn btn-primary" onclick="summarizeReport()" style="margin-top:8px;">
      ✨ AIで要約する
    </button>
    <div id="summaryContainer" style="display:none">
      <p style="font-size:13px;color:#667eea;margin-top:12px;font-weight:600;">📝 要約結果：</p>
      <div class="summary-box" id="summaryText"></div>
    </div>
  </div>

  <!-- Google Sheets保存 -->
  <div class="card">
    <h2>📊 Google Sheets に保存</h2>
    <p style="font-size:13px;color:#888;margin-bottom:12px;">要約が完了したら保存してください</p>
    <button class="btn btn-success" onclick="saveToSheets()">
      💾 Google Sheets に保存
    </button>
    <div id="saveStatus" class="status"></div>
  </div>

  <!-- 過去の日報 -->
  <div class="card">
    <h2>📅 最近の日報</h2>
    <div id="historyList">
      <p style="font-size:13px;color:#aaa;text-align:center;padding:12px;">Google Sheetsからの履歴はログイン後に表示されます</p>
    </div>
    <button class="btn btn-secondary" onclick="loadHistory()" style="margin-top:8px;">
      🔄 履歴を読み込む
    </button>
  </div>

</div>

<script>
// ============ 設定 ============
const CLIENT_ID = '848730239520-pfhoeu5f5i66kunhg4s211i55nb0fjpt.apps.googleusercontent.com';
const SPREADSHEET_ID = '1jyNJncyNTLJe9zqIOnQSuZTed0HSZYzE7corbqnVLPGY';
const SCOPES = 'https://www.googleapis.com/auth/spreadsheets';

// ============ 状態管理 ============
let accessToken = null;
let recognition = null;
let isRecording = false;
let summaryResult = '';

// ============ 初期化 ============
document.addEventListener('DOMContentLoaded', () => {
  updateDateDisplay();
  loadApiKey();
  checkTokenFromUrl();
  if (localStorage.getItem('gAccessToken')) {
    accessToken = localStorage.getItem('gAccessToken');
    updateAuthUI(true);
  }
});

function updateDateDisplay() {
  const now = new Date();
  const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
  document.getElementById('dateDisplay').textContent = now.toLocaleDateString('ja-JP', options);
}

// ============ Google OAuth ============
function handleAuth() {
  if (accessToken) {
    // ログアウト
    accessToken = null;
    localStorage.removeItem('gAccessToken');
    updateAuthUI(false);
    return;
  }
  const redirectUri = window.location.origin + window.location.pathname;
  const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?` +
    `client_id=${CLIENT_ID}` +
    `&redirect_uri=${encodeURIComponent(redirectUri)}` +
    `&response_type=token` +
    `&scope=${encodeURIComponent(SCOPES)}` +
    `&prompt=consent`;
  window.location.href = authUrl;
}

function checkTokenFromUrl() {
  const hash = window.location.hash;
  if (hash.includes('access_token')) {
    const params = new URLSearchParams(hash.substring(1));
    const token = params.get('access_token');
    if (token) {
      accessToken = token;
      localStorage.setItem('gAccessToken', token);
      updateAuthUI(true);
      history.replaceState(null, '', window.location.pathname);
    }
  }
}

function updateAuthUI(loggedIn) {
  const btn = document.getElementById('authBtn');
  const status = document.getElementById('authStatus');
  if (loggedIn) {
    btn.innerHTML = `<span>✅</span> ログアウト`;
    status.textContent = 'Google アカウントに接続済み';
    status.style.color = '#27ae60';
  } else {
    btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Google でログイン`;
    status.textContent = '未ログイン';
    status.style.color = '#888';
  }
}

// ============ Claude API ============
function saveApiKey() {
  const key = document.getElementById('claudeApiKey').value.trim();
  if (!key.startsWith('sk-ant-')) {
    showStatus('apiKeyStatus', 'APIキーの形式が正しくありません（sk-ant-で始まる必要があります）', 'error');
    return;
  }
  localStorage.setItem('claudeApiKey', key);
  showStatus('apiKeyStatus', 'APIキーを保存しました ✅', 'success');
}

function loadApiKey() {
  const key = localStorage.getItem('claudeApiKey');
  if (key) {
    document.getElementById('claudeApiKey').value = key;
  }
}

// ============ 音声認識 ============
function toggleVoice() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    showStatus('voiceStatus', 'このブラウザは音声認識に対応していません。iPhoneのSafariをお使いください。', 'error');
    return;
  }

  if (isRecording) {
    recognition.stop();
    return;
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = 'ja-JP';
  recognition.continuous = true;
  recognition.interimResults = true;

  let finalTranscript = document.getElementById('reportText').value;
  let interimTranscript = '';

  recognition.onstart = () => {
    isRecording = true;
    const btn = document.getElementById('voiceBtn');
    btn.textContent = '⏹️ 録音停止';
    btn.classList.add('recording');
    showStatus('voiceStatus', '🎙️ 録音中... 話してください', 'info');
  };

  recognition.onresult = (event) => {
    interimTranscript = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) {
        finalTranscript += event.results[i][0].transcript;
      } else {
        interimTranscript += event.results[i][0].transcript;
      }
    }
    document.getElementById('reportText').value = finalTranscript + interimTranscript;
  };

  recognition.onend = () => {
    isRecording = false;
    const btn = document.getElementById('voiceBtn');
    btn.textContent = '🎤 音声入力開始';
    btn.classList.remove('recording');
    if (finalTranscript) {
      showStatus('voiceStatus', '✅ 音声入力完了', 'success');
    } else {
      showStatus('voiceStatus', '音声を認識できませんでした', 'error');
    }
  };

  recognition.onerror = (event) => {
    showStatus('voiceStatus', `エラー: ${event.error}`, 'error');
    isRecording = false;
    document.getElementById('voiceBtn').textContent = '🎤 音声入力開始';
    document.getElementById('voiceBtn').classList.remove('recording');
  };

  recognition.start();
}

// ============ AI要約 ============
async function summarizeReport() {
  const text = document.getElementById('reportText').value.trim();
  if (!text) {
    alert('日報テキストを入力してください');
    return;
  }

  const apiKey = localStorage.getItem('claudeApiKey');
  if (!apiKey) {
    // APIキーなし：シンプルな要約
    summaryResult = simpleExtract(text);
    document.getElementById('summaryText').textContent = summaryResult;
    document.getElementById('summaryContainer').style.display = 'block';
    return;
  }

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json',
        'anthropic-dangerous-direct-browser-calls': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 500,
        messages: [{
          role: 'user',
          content: `以下の日報を簡潔に要約してください。「本日の成果」「課題・懸念事項」「明日の予定」の3項目でまとめてください。\n\n${text}`
        }]
      })
    });

    if (!response.ok) throw new Error(`API error: ${response.status}`);
    const data = await response.json();
    summaryResult = data.content[0].text;
    document.getElementById('summaryText').textContent = summaryResult;
    document.getElementById('summaryContainer').style.display = 'block';
  } catch (err) {
    summaryResult = simpleExtract(text);
    document.getElementById('summaryText').textContent = summaryResult + '\n\n（Claude APIエラーのためシンプル要約を使用）';
    document.getElementById('summaryContainer').style.display = 'block';
  }
}

function simpleExtract(text) {
  const sentences = text.split(/[。！？\n]/).filter(s => s.trim().length > 5);
  const summary = sentences.slice(0, 3).join('。') + (sentences.length > 0 ? '。' : '');
  return `【本日の日報要約】\n${summary}\n\n文字数: ${text.length}文字`;
}

// ============ Google Sheets保存 ============
async function saveToSheets() {
  if (!accessToken) {
    showStatus('saveStatus', '先にGoogle アカウントにログインしてください', 'error');
    return;
  }

  const text = document.getElementById('reportText').value.trim();
  if (!text) {
    showStatus('saveStatus', '日報テキストを入力してください', 'error');
    return;
  }

  const now = new Date();
  const dateStr = now.toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit' });
  const timeStr = now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
  const summary = summaryResult || text.substring(0, 200);

  // 課題を抽出（「課題」「問題」「懸念」を含む文）
  const issues = text.split(/[。\n]/).filter(s =>
    s.includes('課題') || s.includes('問題') || s.includes('懸念') || s.includes('困っ')
  ).join('、') || 'なし';

  try {
    showStatus('saveStatus', '保存中...', 'info');
    const response = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/Sheet1!A:D:append?valueInputOption=USER_ENTERED`,
      {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${accessToken}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          values: [[dateStr, timeStr, summary, issues]]
        })
      }
    );

    if (response.status === 401) {
      accessToken = null;
      localStorage.removeItem('gAccessToken');
      updateAuthUI(false);
      showStatus('saveStatus', 'セッションが期限切れです。再度ログインしてください', 'error');
      return;
    }

    if (!response.ok) throw new Error(`Sheets API error: ${response.status}`);

    showStatus('saveStatus', '✅ Google Sheets に保存しました！', 'success');
    document.getElementById('reportText').value = '';
    document.getElementById('summaryContainer').style.display = 'none';
    summaryResult = '';
  } catch (err) {
    showStatus('saveStatus', `エラー: ${err.message}`, 'error');
  }
}

// ============ 履歴読み込み ============
async function loadHistory() {
  if (!accessToken) {
    alert('先にGoogle アカウントにログインしてください');
    return;
  }

  try {
    const response = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/Sheet1!A:D`,
      {
        headers: { 'Authorization': `Bearer ${accessToken}` }
      }
    );

    if (!response.ok) throw new Error(`error: ${response.status}`);
    const data = await response.json();
    const rows = (data.values || []).slice(-5).reverse();

    const container = document.getElementById('historyList');
    if (rows.length === 0) {
      container.innerHTML = '<p style="font-size:13px;color:#aaa;text-align:center;padding:12px;">まだ日報がありません</p>';
      return;
    }

    container.innerHTML = rows.map(row => `
      <div class="history-item">
        <div class="history-date">${row[0] || ''} ${row[1] || ''}</div>
        <div class="history-text">${(row[2] || '').substring(0, 80)}${(row[2] || '').length > 80 ? '...' : ''}</div>
      </div>
    `).join('');
  } catch (err) {
    alert(`読み込みエラー: ${err.message}`);
  }
}

// ============ ユーティリティ ============
function showStatus(id, message, type) {
  const el = document.getElementById(id);
  el.textContent = message;
  el.className = `status show ${type}`;
  if (type === 'success') {
    setTimeout(() => { el.className = 'status'; }, 4000);
  }
}
</script>

<!-- Service Worker登録 -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js')
      .catch(err => console.log('SW registration failed:', err));
  });
}
</script>

</body>
</html>
