<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="日報アプリ">
  <title>日報アプリ</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom);
    }
    header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 16px 16px;
      padding-top: calc(20px + env(safe-area-inset-top));
      text-align: center;
    }
    header h1 { font-size: 22px; font-weight: 700; }
    header p { font-size: 13px; opacity: 0.85; margin-top: 4px; }
    .container { max-width: 600px; margin: 0 auto; padding: 16px; }
    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .card h2 { font-size: 16px; color: #667eea; margin-bottom: 12px; font-weight: 600; }
    textarea {
      width: 100%;
      border: 2px solid #e8ecf0;
      border-radius: 12px;
      padding: 12px;
      font-size: 15px;
      font-family: inherit;
      resize: vertical;
      min-height: 140px;
      transition: border-color 0.2s;
      line-height: 1.6;
    }
    textarea:focus { outline: none; border-color: #667eea; }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 10px;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
    .btn-voice { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }
    .btn-voice.recording { background: linear-gradient(135deg, #f5576c, #c0392b); animation: pulse 1s infinite; }
    .btn-success { background: linear-gradient(135deg, #4facfe, #00f2fe); color: white; }
    .btn-secondary { background: #f0f2f5; color: #555; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.7; } }
    .status {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      margin-top: 10px;
      display: none;
    }
    .status.show { display: block; }
    .status.info { background: #e8f4fd; color: #2980b9; }
    .status.success { background: #e8f8f0; color: #27ae60; }
    .status.error { background: #fde8e8; color: #e74c3c; }
    .date-display {
      font-size: 13px;
      color: #888;
      text-align: center;
      margin-bottom: 16px;
    }
    .summary-box {
      background: #f8f9ff;
      border: 1px solid #e0e4ff;
      border-radius: 10px;
      padding: 12px;
      font-size: 14px;
      line-height: 1.7;
      color: #444;
      margin-top: 10px;
      white-space: pre-wrap;
    }
    .api-key-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .api-key-row input {
      flex: 1;
      border: 2px solid #e8ecf0;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
    }
    .api-key-row input:focus { outline: none; border-color: #667eea; }
    .api-key-row button {
      padding: 10px 16px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
    }
    .history-item {
      border-bottom: 1px solid #f0f2f5;
      padding: 10px 0;
      font-size: 13px;
    }
    .history-item:last-child { border-bottom: none; }
    .history-date { color: #667eea; font-weight: 600; }
    .history-text { color: #555; margin-top: 3px; }
    .badge {
      display: inline-block;
      background: #e8f8f0;
      color: #27ae60;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      margin-left: 8px;
      font-weight: 600;
    }
  </style>
</head>
<body>

<header>
  <h1>📋 日報アプリ</h1>
  <p>音声入力 → AI要約 → Google Sheets自動保存</p>
</header>

<div class="container">

  <!-- 日付 -->
  <div class="date-display" id="dateDisplay"></div>

  <!-- 音声入力・日報作成 -->
  <div class="card">
    <h2>🎙️ 日報入力</h2>
    <button class="btn btn-voice" id="voiceBtn" onclick="toggleVoice()">
      🎤 音声入力開始
    </button>
    <div id="voiceStatus" class="status"></div>
    <textarea id="reportText" placeholder="ここに日報を入力&#10;（音声ボタンを押して話すか、直接入力してください）&#10;&#10;例：今日は〇〇の作業を完了しました。課題として△△があります。"></textarea>
  </div>

  <!-- AI要約 -->
  <div class="card">
    <h2>✨ AI要約 <span class="badge">オプション</span></h2>
    <p style="font-size:13px;color:#888;margin-bottom:8px;">Claude APIキーを設定すると自動要約できます（なくても保存可能）</p>
    <div class="api-key-row">
      <input type="password" id="claudeApiKey" placeholder="sk-ant-...">
      <button onclick="saveApiKey()">保存</button>
    </div>
    <div id="apiKeyStatus" class="status"></div>
    <button class="btn btn-primary" onclick="summarizeReport()" style="margin-top:12px;">
      ✨ AIで要約する
    </button>
    <div id="summaryContainer" style="display:none">
      <p style="font-size:13px;color:#667eea;margin-top:12px;font-weight:600;">📝 要約結果：</p>
      <div class="summary-box" id="summaryText"></div>
    </div>
  </div>

  <!-- Google Sheets保存 -->
  <div class="card">
    <h2>📊 Google Sheets に保存</h2>
    <p style="font-size:13px;color:#888;margin-bottom:12px;">ログイン不要で直接保存できます</p>
    <button class="btn btn-success" onclick="saveToSheets()">
      💾 Google Sheets に保存
    </button>
    <div id="saveStatus" class="status"></div>
  </div>

  <!-- 過去の日報 -->
  <div class="card">
    <h2>📅 最近の日報</h2>
    <div id="historyList">
      <p style="font-size:13px;color:#aaa;text-align:center;padding:12px;">「履歴を読み込む」を押すと表示されます</p>
    </div>
    <button class="btn btn-secondary" onclick="loadHistory()" style="margin-top:8px;">
      🔄 履歴を読み込む
    </button>
  </div>

</div>

<script>
// ============ 設定 ============
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyZqC_aZKQ2HatFgUTz4NymxjcwDt7anHiQZYO6m-EoifDd5qWUh5r-Pcn5n8d0nOY5bg/exec';

// ============ 状態管理 ============
let recognition = null;
let isRecording = false;
let summaryResult = '';

// ============ 初期化 ============
document.addEventListener('DOMContentLoaded', () => {
  updateDateDisplay();
  loadApiKey();
});

function updateDateDisplay() {
  const now = new Date();
  const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
  document.getElementById('dateDisplay').textContent = now.toLocaleDateString('ja-JP', options);
}

// ============ Claude API ============
function saveApiKey() {
  const key = document.getElementById('claudeApiKey').value.trim();
  if (!key.startsWith('sk-ant-')) {
    showStatus('apiKeyStatus', 'APIキーの形式が正しくありません（sk-ant-で始まる必要があります）', 'error');
    return;
  }
  localStorage.setItem('claudeApiKey', key);
  showStatus('apiKeyStatus', 'APIキーを保存しました ✅', 'success');
}

function loadApiKey() {
  const key = localStorage.getItem('claudeApiKey');
  if (key) document.getElementById('claudeApiKey').value = key;
}

// ============ 音声認識 ============
const SILENCE_TIMEOUT = 30000; // 無音30秒で自動停止
let silenceTimer = null;

function stopVoice() {
  isRecording = false;
  clearTimeout(silenceTimer);
  recognition && recognition.stop();
  document.getElementById('voiceBtn').textContent = '🎤 音声入力開始';
  document.getElementById('voiceBtn').classList.remove('recording');
}

function resetSilenceTimer() {
  clearTimeout(silenceTimer);
  silenceTimer = setTimeout(() => {
    showStatus('voiceStatus', '✅ 無音30秒のため自動停止しました', 'success');
    stopVoice();
  }, SILENCE_TIMEOUT);
}

function toggleVoice() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    showStatus('voiceStatus', 'iPhoneのSafariで開いてください', 'error');
    return;
  }
  if (isRecording) {
    showStatus('voiceStatus', '✅ 音声入力を停止しました', 'success');
    stopVoice();
    return;
  }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'ja-JP';
  recognition.continuous = true;
  recognition.interimResults = true;

  let finalTranscript = document.getElementById('reportText').value;

  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('voiceBtn').textContent = '⏹️ 録音停止';
    document.getElementById('voiceBtn').classList.add('recording');
    showStatus('voiceStatus', '🎙️ 録音中... （無音30秒で自動停止）', 'info');
    resetSilenceTimer();
  };

  recognition.onresult = (event) => {
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) {
        finalTranscript += event.results[i][0].transcript;
      } else {
        interim += event.results[i][0].transcript;
      }
    }
    document.getElementById('reportText').value = finalTranscript + interim;
    resetSilenceTimer(); // 発話があるたびにタイマーリセット
  };

  recognition.onend = () => {
    if (isRecording) {
      // 意図せず切れた場合は自動再起動
      try { recognition.start(); } catch(e) { stopVoice(); }
      return;
    }
  };

  recognition.onerror = (e) => {
    if (e.error === 'no-speech' && isRecording) return; // 無音エラーは無視して継続
    showStatus('voiceStatus', `エラー: ${e.error}`, 'error');
    stopVoice();
  };

  recognition.start();
}

// ============ AI要約 ============
async function summarizeReport() {
  const text = document.getElementById('reportText').value.trim();
  if (!text) { alert('日報テキストを入力してください'); return; }

  const apiKey = localStorage.getItem('claudeApiKey');
  if (!apiKey) {
    summaryResult = simpleExtract(text);
    document.getElementById('summaryText').textContent = summaryResult;
    document.getElementById('summaryContainer').style.display = 'block';
    return;
  }

  try {
    showStatus('apiKeyStatus', '要約中...', 'info');
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json',
        'anthropic-dangerous-direct-browser-calls': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 500,
        messages: [{
          role: 'user',
          content: `以下の日報を簡潔に要約してください。「本日の成果」「課題・懸念事項」「明日の予定」の3項目でまとめてください。\n\n${text}`
        }]
      })
    });
    if (!response.ok) throw new Error(`${response.status}`);
    const data = await response.json();
    summaryResult = data.content[0].text;
    document.getElementById('summaryText').textContent = summaryResult;
    document.getElementById('summaryContainer').style.display = 'block';
    showStatus('apiKeyStatus', '要約完了 ✅', 'success');
  } catch (err) {
    summaryResult = simpleExtract(text);
    document.getElementById('summaryText').textContent = summaryResult;
    document.getElementById('summaryContainer').style.display = 'block';
    showStatus('apiKeyStatus', 'APIエラー。シンプル要約を使用します', 'error');
  }
}

function simpleExtract(text) {
  return text.trim();
}

// ============ Google Sheets保存（Apps Script経由） ============
async function saveToSheets() {
  const text = document.getElementById('reportText').value.trim();
  if (!text) { showStatus('saveStatus', '日報テキストを入力してください', 'error'); return; }

  const now = new Date();
  const dateStr = now.toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit' });
  const timeStr = now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
  const report = summaryResult || text.substring(0, 600);
  const issues = text.split(/[。\n]/).filter(s =>
    s.includes('課題') || s.includes('問題') || s.includes('懸念') || s.includes('困っ')
  ).join('、') || 'なし';

  showStatus('saveStatus', '保存中...', 'info');

  try {
    const response = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ date: dateStr, time: timeStr, report, issues })
    });
    const result = await response.json();
    if (result.success) {
      showStatus('saveStatus', '✅ Google Sheets に保存しました！', 'success');
      document.getElementById('reportText').value = '';
      document.getElementById('summaryContainer').style.display = 'none';
      summaryResult = '';
    } else {
      throw new Error(result.error || '不明なエラー');
    }
  } catch (err) {
    showStatus('saveStatus', `エラー: ${err.message}`, 'error');
  }
}

// ============ 履歴読み込み ============
async function loadHistory() {
  try {
    showStatus('saveStatus', '読み込み中...', 'info');
    const response = await fetch(GAS_URL);
    const result = await response.json();
    const rows = (result.data || []).slice(1).reverse().slice(0, 5);

    const container = document.getElementById('historyList');
    if (rows.length === 0) {
      container.innerHTML = '<p style="font-size:13px;color:#aaa;text-align:center;padding:12px;">まだ日報がありません</p>';
    } else {
      container.innerHTML = rows.map(row => `
        <div class="history-item">
          <div class="history-date">${row[0] || ''} ${row[1] || ''}</div>
          <div class="history-text">${(row[2] || '').substring(0, 80)}${(row[2]||'').length > 80 ? '...' : ''}</div>
        </div>
      `).join('');
    }
    showStatus('saveStatus', '', '');
  } catch (err) {
    showStatus('saveStatus', `読み込みエラー: ${err.message}`, 'error');
  }
}

// ============ ユーティリティ ============
function showStatus(id, message, type) {
  const el = document.getElementById(id);
  if (!message) { el.className = 'status'; return; }
  el.textContent = message;
  el.className = `status show ${type}`;
  if (type === 'success') setTimeout(() => { el.className = 'status'; }, 4000);
}
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js')
      .catch(err => console.log('SW:', err));
  });
}
</script>

</body>
</html>
